name: CI

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

on:
  pull_request: {}
  workflow_dispatch: {}

permissions:
  actions: read
  contents: read
  packages: read
  issues: write
  pull-requests: write

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Authenticate with GitHub Packages
        run: |
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.PACKAGES_PAT }}" > ~/.npmrc
          echo "@gnapi-tech:registry=https://npm.pkg.github.com" >> ~/.npmrc

      - name: Install backend dependencies
        run: rm -rf node_modules && npm ci --legacy-peer-deps

      - name: Install frontend dependencies
        run: cd coverage-dashboard && rm -rf node_modules && npm ci --legacy-peer-deps

      - name: Lint and build backend
        run: |
          npm run lint
          npm run build

      - name: Lint and build frontend
        run: |
          cd coverage-dashboard
          npm run lint
          npm run build
