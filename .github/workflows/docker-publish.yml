name: Docker Publish

on:
  push:
    branches:
      - master

permissions:
  contents: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0
      - name: Fetch git tags
        run: git fetch --tags --prune

      - name: Determine Semantic Version
        id: version
        uses: paulhatch/semantic-version@v5.4.0
        with:
          tag_prefix: "v"
          major_pattern: "(MAJOR)"
          minor_pattern: "(MINOR)"
          version_format: "${major}.${minor}.${patch}"
          bump_each_commit: true

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          secrets: |
            github_token=${{ secrets.PACKAGES_READ }}
          build-args: |
            APP_VERSION=${{ steps.version.outputs.version }}
          tags: |
            ghcr.io/${{ github.repository }}/backend:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository }}/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Build and push frontend Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./coverage-dashboard
          file: ./coverage-dashboard/Dockerfile
          push: true
          secrets: |
            github_token=${{ secrets.PACKAGES_READ }}
          tags: |
            ghcr.io/${{ github.repository }}/frontend:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository }}/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Tag commit with semantic version
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          if git rev-parse "${{ steps.version.outputs.version_tag }}" >/dev/null 2>&1; then
            echo "Tag ${{ steps.version.outputs.version_tag }} already exists, skipping tag creation"
          else
            git tag -a "${{ steps.version.outputs.version_tag }}" -m "Release version ${{ steps.version.outputs.version }}"
            git push origin "${{ steps.version.outputs.version_tag }}"
            echo "Created and pushed tag ${{ steps.version.outputs.version_tag }}"
          fi

      - name: Create GitHub release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.version.outputs.version_tag }}
          release_name: Release ${{ steps.version.outputs.version_tag }}
          body: |
            ## Changelog
            ${{ steps.version.outputs.changelog }}
          draft: false
          prerelease: false
